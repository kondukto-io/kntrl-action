name: "kntrl - Stop and Report"
description: "Stops the kntrl agent and prints a detailed runtime security report"
author: "Invicti / Kondukto"

inputs:
  report_file:
    description: "Path to the kntrl report file"
    required: false
    default: "/tmp/kntrl-report.json"

outputs:
  exit_code:
    description: "kntrl exit code (non-zero if policy violations were found in trace mode)"

runs:
  using: "node20"
  main: "dist/index.js"
